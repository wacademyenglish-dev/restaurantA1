<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | Eating Out (A1)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Inter:wght@300;400;600;700;800&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- WOLF LABS ENGINE V3.0: CULINARY EDITION (GOLD & ESPRESSO) --- */
        :root {
            --bg: #0d0a0b; /* Espresso Black */
            --surface: rgba(20, 15, 15, 0.85);
            --surface-hover: rgba(212, 175, 55, 0.1);
            --border: rgba(212, 175, 55, 0.2);
            --accent: #D4AF37; /* Prestige Gold */
            --accent-glow: rgba(212, 175, 55, 0.3);
            --correct: #1DB954;
            --incorrect: #E50914; 
            --text-main: #FFFFFF;
            --text-dim: #A1A1AA;
            --font-display: 'Cinzel', serif; 
            --font-body: 'Inter', sans-serif;
            --font-code: 'Fira Code', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(to top, rgba(13,10,11,1) 5%, rgba(13,10,11,0.7) 100%), 
                        url('https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- AMBIENT ORBS --- */
        .ambient-orbs {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; overflow: hidden; pointer-events: none;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15;
            animation: floatOrb 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: #8B4513; bottom: -20%; right: -10%; animation-delay: -5s; }

        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* --- HEADER --- */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 80px; padding: 0 40px;
            display: flex; align-items: center; justify-content: space-between; z-index: 100;
            background: rgba(13,10,11,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: var(--font-display); font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; color: #fff; }
        .logo span { color: var(--accent); }
        .lesson-info { font-family: var(--font-code); font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; border-left: 1px solid var(--border); padding-left: 20px; margin-left: 20px; flex: 1; display: none; }
        @media (min-width: 1000px) { .lesson-info { display: block; } }

        .progress-container { position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.05); }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; box-shadow: 0 0 15px var(--accent-glow); }

        .controls { display: flex; gap: 15px; }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--accent); width: 45px; height: 45px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; backdrop-filter: blur(10px); font-size: 1.2rem;}
        .icon-btn:hover { background: var(--accent); color: #000; transform: scale(1.1); border-color: var(--accent);}

        /* --- MAIN LAYOUT --- */
        main {
            flex: 1; width: 100%; max-width: 1100px; margin: 0 auto;
            padding-top: 100px; padding-bottom: 150px;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 10;
        }
        
        .step {
            position: absolute; width: 100%; max-width: 950px;
            opacity: 0; pointer-events: none; transform: scale(0.96);
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            visibility: hidden; max-height: 80vh; overflow-y: auto; padding: 20px;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .step::-webkit-scrollbar { width: 4px; }
        .step::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .step.active { opacity: 1; pointer-events: auto; transform: scale(1); visibility: visible; position: relative; }

        /* --- GLASSMORPHISM PANELS --- */
        .glass-panel {
            background: linear-gradient(135deg, rgba(20,15,15,0.9) 0%, rgba(10,5,5,0.95) 100%);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            padding: 50px; position: relative; z-index: 10; width: 100%; text-align: center;
        }

        .dual-panel { display: flex; gap: 50px; align-items: center; width: 100%; text-align: left;}
        .dual-panel > * { flex: 1; }
        @media (max-width: 850px) { .dual-panel { flex-direction: column; gap: 30px; text-align: center;} }

        /* --- TYPOGRAPHY & BUTTONS --- */
        h1, h2, h3 { font-family: var(--font-display); letter-spacing: 1px; text-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 20px;}
        h1 { font-size: 4.5rem; line-height: 1.1; color: #fff; }
        h2 { font-size: 2.2rem; color: var(--accent); display: flex; align-items: center; justify-content: center; gap: 15px; }
        .dual-panel h2 { justify-content: flex-start; }
        p { font-size: 1.2rem; color: var(--text-dim); margin-bottom: 20px; line-height: 1.7;}

        .code-tag { font-family: var(--font-code); font-weight: 800; color: var(--accent); font-size: 0.85rem; background: rgba(212, 175, 55, 0.1); padding: 4px 12px; border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.2); text-transform: uppercase; display: inline-block; margin-bottom: 15px;}

        .btn {
            padding: 16px 40px; border: none; border-radius: 12px; font-family: var(--font-display);
            font-size: 1.1rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 10px;
            background: #fff; color: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-accent { background: var(--accent); color: #000; box-shadow: 0 10px 30px var(--accent-glow); }
        .btn:hover { transform: translateY(-3px) scale(1.02); }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        /* --- SPEAKING HUB --- */
        .speaking-hub {
            margin-top: 40px; padding: 35px; background: rgba(212, 175, 55, 0.05);
            border-radius: 16px; border: 1px solid var(--accent-glow); position: relative; text-align: left;
        }
        .speaking-hub::before {
            content: '🎙️ SPEAKING HUB'; position: absolute; top: -14px; left: 30px;
            background: var(--accent); color: #000; font-family: var(--font-body); font-size: 0.75rem;
            font-weight: 900; padding: 6px 16px; border-radius: 6px; letter-spacing: 2px; box-shadow: 0 0 15px var(--accent-glow);
        }
        .speaking-hub p { color: #fff; font-weight: 600; font-size: 1.3rem; margin-bottom: 15px; }
        
        .speaking-starters-container { display: flex; flex-wrap: wrap; gap: 12px; }
        .speaking-starter {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; padding: 10px 20px; border-radius: 500px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .speaking-starter:hover, .speaking-starter.active { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.05); }

        /* --- INTERACTIVE MODULES --- */
        .choice-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .choice-card { padding: 30px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.03); border-radius: 16px; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .choice-card:hover { background: rgba(212, 175, 55, 0.08); border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.2);}
        .choice-card h3 { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 10px; color: #fff;}
        .choice-card i { font-size: 2.8rem; color: var(--accent); display: block; margin-bottom: 15px; transition: 0.3s;}
        .choice-card:hover i { transform: scale(1.1); }

        .vocab-word { color: var(--accent); font-weight: 800; cursor: pointer; border-bottom: 2px dashed var(--accent); padding-bottom: 2px; transition: 0.3s;}
        .vocab-word:hover { color: #fff; border-color: #fff; text-shadow: 0 0 10px var(--accent-glow);}

        .highlight-zone { padding: 35px; background: rgba(255,255,255,0.02); border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); text-align: center; font-size: 1.5rem; line-height: 1.8; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);}

        /* Video Wrapper */
        .video-wrapper { position: relative; aspect-ratio: 16/9; width: 100%; max-width: 900px; margin: 0 auto 30px auto; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid var(--border);}
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* BUILDERS */
        .drop-zone { min-height: 120px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 16px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; padding: 20px; gap: 12px; flex-wrap: wrap; background: rgba(0, 0, 0, 0.3); transition: 0.3s;}
        .drop-zone.success { border-color: var(--correct); border-style: solid; background: rgba(29, 185, 84, 0.1); box-shadow: inset 0 0 30px rgba(29,185,84,0.15); }
        .word-bank { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;}
        .word-chip { padding: 14px 28px; background: var(--accent); border-radius: 8px; cursor: pointer; user-select: none; transition: all 0.3s; font-weight: 800; border: none; color: #000; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);}
        .word-chip:hover { filter: brightness(1.1); transform: translateY(-4px); }
        .word-chip.used { opacity: 0; pointer-events: none; transform: scale(0.8); }

        /* Error Finder */
        .error-sentence { font-size: 1.8rem; word-spacing: 5px; line-height: 2; font-weight: 600; text-align: center;}
        .error-word { display: inline-block; padding: 6px 12px; cursor: pointer; border-radius: 8px; transition: 0.2s; border: 1px solid transparent;}
        .error-word:hover { background: rgba(255,255,255,0.1); border-color: rgba(212, 175, 55, 0.4);}

        /* CHAT */
        .chat-container { display: flex; flex-direction: column; gap: 20px; margin-top: 20px;}
        .msg { padding: 18px 25px; border-radius: 16px; max-width: 85%; font-size: 1.1rem; line-height: 1.5; text-align: left; position: relative;}
        .msg.friend { background: rgba(255,255,255,0.05); align-self: flex-start; border-bottom-left-radius: 4px; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .msg.you { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; display: none; font-weight: 700; box-shadow: 0 5px 15px var(--accent-glow);}
        .chat-option { padding: 18px; background: rgba(255,255,255,0.03); border-radius: 12px; cursor: pointer; text-align: left; color: #fff; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;}
        .chat-option:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--accent); transform: translateX(5px);}

        /* Toggle Rows */
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 25px; margin-bottom: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; font-weight: 600; font-size: 1.2rem; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; color: #fff; text-align: left;}
        .toggle-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: 800; transition: 0.3s;}
        .toggle-btn:hover { background: rgba(212, 175, 55, 0.15); }
        .toggle-btn.correct { background: var(--correct); color: #000; border-color: var(--correct); }
        .toggle-btn.incorrect { background: var(--incorrect); color: #fff; border-color: var(--incorrect); }

        /* The Arena */
        .arena-grid { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap;}
        .arena-card { width: 250px; height: 350px; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; position: relative; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.6);}
        .arena-card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; border-radius: 24px; border: 1px solid var(--border); }
        .card-front { background: rgba(255,255,255,0.05); font-size: 4rem; color: var(--accent); }
        .card-back { background: var(--accent); transform: rotateY(180deg); color: #000; }
        .card-back h3 { color: #000; font-weight: 900; font-family: var(--font-display); font-size: 1.8rem; margin-bottom: 10px;}

        /* --- ASIDE PANELS --- */
        .vocab-panel {
            position: fixed; top: 0; right: -500px; width: 450px; height: 100vh;
            background: rgba(13, 10, 11, 0.98); backdrop-filter: blur(40px); z-index: 200;
            padding: 70px 40px; border-left: 1px solid var(--border); transition: right 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; gap: 25px; box-shadow: -20px 0 60px rgba(0,0,0,0.9); overflow-y: auto;
        }
        .vocab-panel.open { right: 0; }
        .close-aside { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.05); border: none; color: #B3B3B3; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s;}
        .close-aside:hover { background: var(--incorrect); color: #fff; transform: rotate(90deg); }

        .whiteboard-panel { position: fixed; bottom: 110px; right: 30px; width: 450px; height: 500px; background: rgba(13, 10, 11, 0.98); border: 1px solid var(--border); border-radius: 16px; z-index: 101; transform: translateY(120%) scale(0.9); display: flex; flex-direction: column; transition: all 0.5s cubic-bezier(0.3, 0, 0, 1); box-shadow: 0 30px 60px rgba(0,0,0,0.9); backdrop-filter: blur(30px); opacity: 0;}
        .whiteboard-panel.open { transform: translateY(0) scale(1); opacity: 1;}
        .wb-header { padding: 20px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-weight: 700; color: #fff;}
        .wb-content { flex: 1; padding: 20px; outline: none; color: var(--accent); font-family: var(--font-code); font-size: 1.1rem; resize: none; border: none; background: transparent; }

        /* --- HEADERS & FOOTERS --- */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 100px; padding: 0 50px;
            background: rgba(13,10,11,0.95); border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between; z-index: 90; backdrop-filter: blur(20px);
        }
    </style>
</head>
<body>

    <div class="ambient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <header class="header">
        <div style="display: flex; align-items: center;">
            <div class="logo"><i class="fa-solid fa-utensils" style="color:var(--accent); margin-right:8px;"></i> WOLF LABS </div>
            <div class="lesson-info">Interactive lesson | THE RESTAURANT | FUTURE WILL x GOING TO | A1</div>
        </div>
        <div class="controls">
            <button class="icon-btn" onclick="toggleWhiteboard()" title="Live Whiteboard"><i class="fa-solid fa-chalkboard"></i></button>
            <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen Mode"><i class="fa-solid fa-expand"></i></button>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    </header>

    <main id="main-container"></main>

    <nav class="nav-bar">
        <button class="btn" style="background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2);" id="prevBtn" onclick="prevStep()" disabled><i class="fa-solid fa-arrow-left"></i> BACK</button>
        <div id="stepCounter" style="font-weight: 800; font-size: 1rem; color: var(--text-dim); letter-spacing: 2px;">SCENE 1 / 31</div>
        <button class="btn btn-accent" id="nextBtn" onclick="nextStep()">NEXT SCENE <i class="fa-solid fa-arrow-right"></i></button>
    </nav>

    <aside class="vocab-panel" id="vocabPanel">
        <button class="close-aside" onclick="closeVocab()"><i class="fa-solid fa-xmark"></i></button>
        <div id="asideContent"></div>
    </aside>

    <aside class="whiteboard-panel" id="whiteboardPanel">
        <div class="wb-header"><span><i class="fa-solid fa-chalkboard" style="color:var(--accent); margin-right: 10px;"></i> Teacher's Board</span><button class="close-aside" style="position:static; width:30px; height:30px;" onclick="toggleWhiteboard()"><i class="fa-solid fa-xmark"></i></button></div>
        <textarea class="wb-content" placeholder="> Type grammar rules, vocabulary, or notes here..."></textarea>
    </aside>

    <script>
        // --- 1. VOCAB DATA ---
        const vocabData = {
            'eat out': { def: 'To eat a meal at a restaurant instead of at home.', ex: 'Let\'s eat out tonight!', speak: 'How often do you eat out?' },
            'special occasion': { def: 'An important day or event, like a birthday.', ex: 'We are celebrating a special occasion.', speak: 'What is your next special occasion?' },
            'atmosphere': { def: 'The feeling or mood in a place.', ex: 'This restaurant has a great atmosphere.', speak: 'Do you prefer a quiet or loud atmosphere?' },
            'order': { def: 'To ask the waiter for food and drinks.', ex: 'Are you ready to order?', speak: 'What do you usually order to drink?' },
            'delicious': { def: 'Very tasty.', ex: 'The pasta was delicious.', speak: 'What is the most delicious food you know?' },
            'spicy': { def: 'Having a strong, hot flavor.', ex: 'I love spicy Indian curries.', speak: 'Do you like spicy food?' }
        };

        // --- 2. LESSON CONTENT (31 STEPS) ---
        const stepsData = [
            // 0: GUIDE
            `<div class="glass-panel" style="max-width: 850px; margin: 0 auto;">
                <h2><i class="fa-solid fa-user-shield"></i> Teacher Guide: Culinary Edition</h2>
                <div style="border-left: 4px solid var(--accent); padding-left: 20px; margin: 20px 0; background: rgba(255,255,255,0.02); padding-top: 15px; padding-bottom: 15px; border-radius: 0 12px 12px 0; text-align: left;">
                    <p><strong>Topic:</strong> Restaurants, Food, Ordering.</p>
                    <p><strong>Target Level:</strong> A1 (Beginner).</p>
                    <p><strong>Grammar Focus:</strong> Future (Will vs. Going to) + Present/Past review.</p>
                    <p><strong>Teacher Note:</strong> This is a conversational lesson. The goal is to make the student comfortable ordering food (I'll have...) and talking about plans (I'm going to...). Use the Speaking Hubs to elicit full sentences.</p>
                </div>
                <button class="btn btn-accent" style="margin-top:10px;" onclick="this.style.display='none'; unlockPrompt('p0')">Initialize Experience</button>
                <div class="speaking-hub" id="p0" style="display:none;"><p>Teacher: Welcome the student. Ask: "Are you hungry right now?"</p></div>
            </div>`,
            
            // 1: HERO
            `<div class="glass-panel" style="text-align: center; background: transparent; border: none; box-shadow: none; padding: 0;">
                <div class="dual-panel" style="align-items: center;">
                    <div style="flex: 1.2; text-align: left;">
                        <span class="code-tag">A1 BEGINNER | LIFESTYLE</span>
                        <h1 style="font-size: 5rem; margin-top: 10px;">The Restaurant</h1>
                        <p style="font-size: 1.3rem;">Learn how to talk about your favorite food, order a meal, and make future plans.</p>
                        <button class="btn btn-accent" style="margin-top: 30px;" onclick="this.style.display='none'; unlockPrompt('p1')"><i class="fa-solid fa-play"></i> Enter the Lesson</button>
                    </div>
                    <div style="flex: 0.8;">
                        <div style="background: rgba(255,255,255,0.02); padding: 50px; border-radius: 24px; border: 1px solid var(--border); text-align: center; backdrop-filter: blur(10px);">
                            <i class="fa-solid fa-bell-concierge" style="font-size: 4rem; color: var(--accent); margin-bottom: 20px;"></i>
                            <h3 style="color: #fff; font-size: 2rem; font-family: var(--font-display);">Dining Out</h3>
                            <p style="font-size: 1.1rem; margin:0; color: var(--text-dim);">Focus: Future (Will x Going to)</p>
                        </div>
                        <div class="speaking-hub" id="p1" style="display:none; margin-top: 20px;">
                            <p>What is your favorite restaurant in your city?</p>
                        </div>
                    </div>
                </div>
            </div>`,

            // 2: PAST REVIEW
            `<div class="glass-panel">
                <h2><i class="fa-solid fa-clock-rotate-left"></i> Past Review: Lunch</h2>
                <p style="font-size: 1.2rem; margin-bottom: 30px;">Let's remember the Past Simple. "Eat" becomes "Ate" or "Had".</p>
                <div class="highlight-zone" style="font-size: 1.8rem; color: #fff;">
                    "What did you eat for lunch today?"
                </div>
                <div class="choice-grid" style="margin-top:30px;">
                    <div class="choice-card" onclick="selectCard(this, '.choice-grid'); unlockPrompt('p2')">
                        <i class="fa-solid fa-bowl-food"></i>
                        <h3>I had pasta.</h3>
                    </div>
                    <div class="choice-card" onclick="selectCard(this, '.choice-grid'); unlockPrompt('p2')">
                        <i class="fa-solid fa-burger"></i>
                        <h3>I had a sandwich.</h3>
                    </div>
                    <div class="choice-card" onclick="selectCard(this, '.choice-grid'); unlockPrompt('p2')">
                        <i class="fa-solid fa-leaf"></i>
                        <h3>I had a salad.</h3>

            `<div class="glass-panel" style="text-align: center; border: 1px solid var(--correct); background: rgba(29, 185, 84, 0.05); box-shadow: 0 0 100px rgba(29, 185, 84, 0.2);">

                    <span style="color:var(--accent); font-family: var(--font-code); font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 20px;"><i class="fa-solid fa-database"></i> Session Log</span>

                <button class="btn btn-accent" style="padding: 20px 60px; font-size: 1.3rem;" onclick="alert('Session logged. You can close this window.')"><i class="fa-solid fa-power-off"></i> Close Session</button>

        ];

        // --- CORE LOGIC ---
        let currentStep = 0;
        const totalSteps = stepsData.length;
        const mainContainer = document.getElementById('main-container');

        function initializeSteps() {
            mainContainer.innerHTML = '';
            stepsData.forEach((htmlContent, index) => {
                const section = document.createElement('section');
                section.className = 'step';
                section.id = `step-${index}`;
                section.innerHTML = htmlContent;
                mainContainer.appendChild(section);
            });
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.step').forEach((step, index) => {
                if(index === currentStep) {
                    step.classList.add('active');
                } else {
                    step.classList.remove('active');
                }
            });

            document.getElementById('prevBtn').disabled = currentStep === 0;
            document.getElementById('nextBtn').style.display = currentStep === totalSteps - 1 ? 'none' : 'block';
            
            // Fix ID here to match the HTML element id="stepCounter"
            document.getElementById('stepCounter').innerText = `SCENE ${currentStep + 1} / ${totalSteps}`;
            
            const pb = document.getElementById('progressBar');
            if (pb) {
                const progress = (currentStep / (totalSteps - 1)) * 100;
                pb.style.width = `${progress}%`;
            }

            mainContainer.scrollTo(0, 0);
        }

        function nextStep() {
            if (currentStep < totalSteps - 1) { currentStep++; updateUI(); closeVocab(); }
        }

        function prevStep() {
            if (currentStep > 0) { currentStep--; updateUI(); closeVocab(); }
        }

        // --- INTERACTION FUNCTIONS ---
        function unlockPrompt(id) {
            const prompt = document.getElementById(id);
            if(prompt) prompt.style.display = 'block';
        }

        function selectCard(card, groupSelector) {
            const parent = card.closest('div').parentElement;
            parent.querySelectorAll('.choice-card').forEach(el => {
                el.style.opacity = '0.4';
                el.style.borderColor = 'transparent';
            });
            card.style.opacity = '1';
            card.style.borderColor = 'var(--accent)';
        }

        function genericCorrect(btn, isCorrect, promptIdStr) {
            const parent = btn.parentElement;
            let attempts = parseInt(parent.dataset.attempts || '0');
            
            const options = Array.from(parent.querySelectorAll('div, button, span')).filter(b => b.hasAttribute('onclick') && b.getAttribute('onclick').includes('genericCorrect'));
            const maxAttempts = Math.min(3, options.length - 1);

            const correctBtn = options.find(b => b.getAttribute('onclick') && b.getAttribute('onclick').includes('true'));
            let promptIdToUnlock = promptIdStr;

            if(isCorrect) {
                options.forEach(b => b.style.pointerEvents = 'none');
                btn.style.backgroundColor = 'var(--correct)';
                btn.style.color = '#000';
                btn.style.borderColor = 'var(--correct)';
                if (promptIdToUnlock) unlockPrompt(promptIdToUnlock);
            } else {
                attempts++;
                parent.dataset.attempts = attempts;
                
                btn.style.backgroundColor = 'var(--incorrect)';
                btn.style.color = '#fff';
                btn.style.borderColor = 'var(--incorrect)';
                btn.style.animation = 'shake 0.4s';
                btn.style.pointerEvents = 'none';
                
                if (attempts >= maxAttempts) {
                    options.forEach(b => b.style.pointerEvents = 'none');
                    if (correctBtn) {
                        correctBtn.style.backgroundColor = 'var(--correct)';
                        correctBtn.style.color = '#000';
                        correctBtn.style.borderColor = 'var(--correct)';
                    }
                    if (promptIdToUnlock) {
                        setTimeout(() => unlockPrompt(promptIdToUnlock), 500);
                    }
                }
            }
        }

        function checkTrueFalse(btn, isCorrect, promptId) {
            const parent = btn.parentElement;
            let attempts = parseInt(parent.dataset.attempts || '0');
            const options = Array.from(parent.querySelectorAll('button'));
            
            if (isCorrect) {
                options.forEach(b => b.style.pointerEvents = 'none');
                btn.style.backgroundColor = 'var(--correct)';
                btn.style.color = '#000';
                btn.style.borderColor = 'var(--correct)';
                unlockPrompt(promptId);
            } else {
                attempts++;
                parent.dataset.attempts = attempts;
                
                btn.style.backgroundColor = 'var(--incorrect)';
                btn.style.color = '#fff';
                btn.style.borderColor = 'var(--incorrect)';
                btn.style.animation = 'shake 0.4s';
                btn.style.pointerEvents = 'none';
                
                if (attempts >= 1) {
                    options.forEach(b => {
                        b.style.pointerEvents = 'none';
                        if (b.getAttribute('onclick').includes('true')) {
                            b.style.backgroundColor = 'var(--correct)';
                            b.style.color = '#000';
                            b.style.borderColor = 'var(--correct)';
                        }
                    });
                    setTimeout(() => unlockPrompt(promptId), 500);
                }
            }
        }

        // Builders
        let buildState = {};
        window.moveWord = function(chip, dzId, targetArray, promptId) {
            if(chip.classList.contains('used')) return;
            const word = chip.innerText;
            const dz = document.getElementById(dzId);
            
            const newChip = document.createElement('div');
            newChip.className = 'word-chip';
            newChip.style.background = 'var(--accent)';
            newChip.style.color = '#000';
            newChip.innerText = word;
            
            if (!chip.id) chip.id = 'chip_' + Math.random().toString(36).substr(2, 9);
            newChip.dataset.sourceId = chip.id;

            newChip.onclick = function() {
                if(dz.classList.contains('success')) return;
                dz.removeChild(this);
                document.getElementById(this.dataset.sourceId).classList.remove('used');
                const idx = buildState[dzId].lastIndexOf(this.innerText);
                if(idx !== -1) buildState[dzId].splice(idx, 1);
            };
            
            dz.appendChild(newChip);
            chip.classList.add('used');

            if(!buildState[dzId]) buildState[dzId] = [];
            buildState[dzId].push(word);

            if(buildState[dzId].length === targetArray.length) {
                if(JSON.stringify(buildState[dzId]) === JSON.stringify(targetArray)) {
                    dz.classList.add('success');
                    Array.from(dz.children).forEach(c => {
                        c.style.background = 'var(--correct)';
                        c.style.color = '#000';
                        c.style.cursor = 'default';
                        c.style.pointerEvents = 'none';
                    });
                    unlockPrompt(promptId);
                } else {
                    let attempts = parseInt(dz.dataset.attempts || '0') + 1;
                    dz.dataset.attempts = attempts;
                    
                    dz.style.borderColor = 'var(--incorrect)';
                    dz.style.animation = 'shake 0.4s';
                    
                    if (attempts >= 3) {
                        setTimeout(() => {
                            dz.innerHTML = ''; dz.style.borderColor = ''; dz.style.animation = ''; dz.classList.add('success');
                            targetArray.forEach(w => {
                                const finalChip = document.createElement('div');
                                finalChip.className = 'word-chip'; finalChip.style.background = 'var(--correct)'; finalChip.style.color = '#000'; finalChip.innerText = w; finalChip.style.pointerEvents = 'none';
                                dz.appendChild(finalChip);
                            });
                            chip.parentElement.querySelectorAll('.word-chip').forEach(c => c.classList.add('used'));
                            setTimeout(() => unlockPrompt(promptId), 500);
                        }, 1000);
                    } else {
                        setTimeout(() => { 
                            dz.innerHTML = ''; dz.style.borderColor='rgba(255,255,255,0.2)'; dz.style.animation=''; buildState[dzId]=[]; 
                            chip.parentElement.querySelectorAll('.word-chip').forEach(c=>c.classList.remove('used')); 
                        }, 1000);
                    }
                }
            }
        }

        // Chat
        function handleChat(btn, isCorrect, containerId, promptId) {
            const container = document.getElementById(containerId);
            let attempts = parseInt(container.dataset.attempts || '0');
            const options = Array.from(container.querySelectorAll('.chat-option'));
            const maxAttempts = Math.min(3, options.length - 1);

            if(isCorrect) {
                options.forEach(b => b.style.pointerEvents = 'none');
                btn.style.backgroundColor = 'var(--correct)';
                btn.style.color = '#000';
                setTimeout(() => {
                    container.innerHTML = `<div class="msg you" style="display:block;">${btn.innerText}</div>`;
                    unlockPrompt(promptId);
                }, 800);
            } else {
                attempts++;
                container.dataset.attempts = attempts;
                
                btn.style.backgroundColor = 'var(--incorrect)';
                btn.style.color = '#fff';
                btn.style.animation = 'shake 0.4s';
                btn.style.pointerEvents = 'none';

                if (attempts >= maxAttempts) {
                    const correctBtn = options.find(b => b.getAttribute('onclick').includes('true'));
                    options.forEach(b => b.style.pointerEvents = 'none');
                    if (correctBtn) {
                        correctBtn.style.backgroundColor = 'var(--correct)';
                        correctBtn.style.color = '#000';
                        setTimeout(() => {
                            container.innerHTML = `<div class="msg you" style="display:block;">${correctBtn.innerText}</div>`;
                            unlockPrompt(promptId);
                        }, 1000);
                    }
                } else {
                    setTimeout(() => { btn.style.animation = ''; btn.style.backgroundColor = 'rgba(255,255,255,0.03)'; }, 800);
                }
            }
        }

        // Match Game
        let matchSelected = null;
        let matchesFound = 0;
        function handleMatch(card, matchVarName, matchesFoundVarName, targetMatches, promptId) {
            if(card.style.opacity === '0') return;
            if(!window[matchVarName]) {
                window[matchVarName] = card;
                card.style.borderColor = 'var(--accent)';
            } else {
                if(window[matchVarName].dataset.val === card.dataset.val && window[matchVarName] !== card) {
                    window[matchVarName].style.opacity = '0'; card.style.opacity = '0';
                    window[matchesFoundVarName]++;
                    if(window[matchesFoundVarName] === targetMatches) unlockPrompt(promptId);
                } else {
                    window[matchVarName].style.borderColor = 'var(--border)';
                    card.style.animation = 'shake 0.4s';
                    setTimeout(() => card.style.animation = '', 400);
                }
                window[matchVarName] = null;
            }
        }

        // Memory Game
        let memIndex = 0;
        let memAttempts = 0;

        function startMemoryGame(seqStr) {
            document.getElementById('mem-seq').style.display = 'none';
            document.getElementById('mem-start').style.display = 'none';
            document.getElementById('mem-test').style.display = 'block';
            memIndex = 0;
            memAttempts = 0;
            window.currentMemSequence = seqStr.split('|');
        }

        function checkMem(btn, word, seqStr, promptId) {
            const seq = window.currentMemSequence || seqStr.split('|');
            const parent = btn.parentElement;
            let attempts = parseInt(parent.dataset.attempts || '0');

            if(word === seq[memIndex]) {
                btn.style.backgroundColor = 'var(--correct)';
                btn.style.color = '#000';
                btn.style.borderColor = 'var(--correct)';
                btn.style.pointerEvents = 'none';
                memIndex++;
                attempts = 0;
                parent.dataset.attempts = attempts;
                if(memIndex === seq.length) unlockPrompt(promptId);
            } else {
                attempts++;
                parent.dataset.attempts = attempts;
                btn.style.backgroundColor = 'var(--incorrect)';
                btn.style.borderColor = 'var(--incorrect)';
                btn.style.animation = 'shake 0.4s';
                
                setTimeout(()=> {
                    if(btn.style.backgroundColor !== 'var(--correct)') {
                        btn.style.backgroundColor = 'transparent';
                        btn.style.borderColor = 'var(--border)';
                    }
                }, 400);

                if (attempts >= 3) {
                    const correctWord = seq[memIndex];
                    const correctBtn = Array.from(parent.querySelectorAll('.btn-outline')).find(b => b.innerText.trim() === correctWord);
                    if (correctBtn) {
                        correctBtn.style.backgroundColor = 'var(--correct)';
                        correctBtn.style.color = '#000';
                        correctBtn.style.borderColor = 'var(--correct)';
                        correctBtn.style.pointerEvents = 'none';
                    }
                    memIndex++;
                    attempts = 0;
                    parent.dataset.attempts = attempts;
                    if(memIndex === seq.length) setTimeout(() => unlockPrompt(promptId), 500);
                }
            }
        }

        function flipCard(card, promptId) {
            if(!card.classList.contains('flipped')) {
                card.classList.add('flipped');
                unlockPrompt(promptId);
            }
        }

        // Roles
        const roles = [
            "A person who only eats spicy Indian food.",
            "A healthy person who only wants a salad.",
            "Someone who is very hungry and wants a burger."
        ];
        function generateRole(promptId) {
            document.getElementById('role-box').innerText = roles[Math.floor(Math.random() * roles.length)];
            unlockPrompt(promptId);
        }

        function openVocab(word, promptId) {
            const data = vocabData[word.toLowerCase()];
            if(data) {
                document.getElementById('asideContent').innerHTML = `
                    <p class="code-tag" style="margin-bottom: 10px; display: inline-block;">// DICTIONARY</p>
                    <h2 id="vocab-title" style="font-size: 3rem; margin-bottom: 20px; color:#fff; font-family: var(--font-display); text-transform: uppercase;">${word}</h2>
                    
                    <div class="glass-panel" style="padding: 30px; text-align: left; margin-bottom: 25px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); box-shadow: none;">
                        <span style="color: var(--accent); font-weight: 900; margin-bottom: 10px; font-size: 0.85rem; letter-spacing: 2px; display:block;">DEFINITION</span>
                        <p id="vocab-def" style="color: #fff; margin-bottom: 25px; font-size: 1.15rem; line-height: 1.6;">${data.def}</p>
                        
                        <span style="color: var(--accent); font-weight: 900; margin-bottom: 10px; font-size: 0.85rem; letter-spacing: 2px; display:block;">EXAMPLE</span>
                        <p id="vocab-ex" style="font-style: italic; color: #fff; font-size: 1.1rem; line-height: 1.6; margin:0;">"${data.ex}"</p>
                    </div>
                    
                    <div style="background: rgba(0,0,0,0.4); border: 1px solid var(--accent); border-radius: 16px; padding: 30px; position: relative;">
                        <span style="position: absolute; top: -14px; left: 20px; background: var(--accent); color: #000; font-weight: 900; font-size: 0.75rem; letter-spacing: 1px; padding: 5px 12px; border-radius: 4px;">🎙️ SPEAKING HUB</span>
                        <p style="color: var(--text-dim); font-size: 1.15rem; font-weight: 600; margin:0; line-height: 1.5;">${data.speak}</p>
                    </div>
                `;
            }
            document.getElementById('vocabPanel').classList.add('open');
            if (promptId) unlockPrompt(promptId);
        }
        
        function closeVocab() { document.getElementById('vocabPanel').classList.remove('open'); }
        function toggleWhiteboard() { document.getElementById('whiteboardPanel').classList.toggle('open'); }
        function toggleFullscreen() { 
            try {
                if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(()=>{}); } 
                else { document.exitFullscreen(); }
            } catch (err) {}
        }

        window.onload = initializeSteps;
    </script>
